<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A letter for Nhung 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#fef8f0;
  --blush:#f9c4cc;
  --peach:#fddbb4;
  --lavender:#e8d5f5;
  --rose:#d4637a;
  --soft:#7a5a63;
  --deep:#3d2532;
  --gold:#e8b86d;
  --env:#fff0f3;
  --env-dark:#f5c8d0;
  --env-shadow:rgba(212,99,122,0.18);
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--deep);
  -webkit-text-size-adjust:100%;
}

/* ── BACKGROUND PETALS ── */
.bg-petal{
  position:fixed;pointer-events:none;
  animation:bgFloat linear infinite;
  opacity:.3;z-index:0;font-size:12px;
}
@keyframes bgFloat{
  0%{transform:translateY(-10px) rotate(0deg);opacity:0}
  10%{opacity:.3}90%{opacity:.15}
  100%{transform:translateY(101vh) rotate(300deg);opacity:0}
}

/* ── SCENE ── */
.scene{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;z-index:1;
}



/* ── ENVELOPE WRAPPER ── */
.env-wrap{
  position:relative;
  width:clamp(260px,52vw,360px);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  animation:floatEnv 4s ease-in-out infinite;
  transition:transform .25s ease;
  filter:drop-shadow(0 12px 32px var(--env-shadow));
}
.env-wrap:hover{
  animation:none;
  transform:translateY(-8px) scale(1.03);
  filter:drop-shadow(0 20px 48px rgba(212,99,122,0.26));
}
.env-wrap:active{transform:scale(.97)}

@keyframes floatEnv{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(-10px)}
}

/* ── SVG ENVELOPE ── */
.env-svg{width:100%;display:block;overflow:visible}

/* envelope body */
.env-body{fill:var(--env);stroke:var(--env-dark);stroke-width:1.5}

/* flap (rotates open) */
.env-flap{
  fill:var(--env);stroke:var(--env-dark);stroke-width:1.5;
  transform-origin:50% 0%;
  transform:rotateX(0deg);
  transition:transform .7s cubic-bezier(.4,0,.2,1);
}
.opened .env-flap{
  transform:rotateX(-180deg);
}

/* inner flap triangle shadow */
.env-inner{fill:#fce8ec;opacity:.6}

/* side triangles */
.env-left{fill:#fde0e5}
.env-right{fill:#fde0e5}

/* envelope bottom fold line */
.env-fold{stroke:var(--env-dark);stroke-width:1;fill:none;opacity:.4}

/* wax seal */
.seal-group{
  transform-origin:50% 50%;
  transition:transform .5s ease, opacity .5s ease;
}
.opened .seal-group{
  transform:scale(0);
  opacity:0;
}

/* ── LETTER ── */
.letter{
  position:absolute;
  left:50%;
  bottom:28%;
  transform:translateX(-50%) translateY(0px);
  width:72%;
  background:white;
  border-radius:6px 6px 4px 4px;
  padding:14px 14px 10px;
  box-shadow:0 2px 12px rgba(61,37,50,.1);
  border:1px solid rgba(249,196,204,.5);
  opacity:0;
  transition:transform .7s cubic-bezier(.2,.8,.3,1) .2s, opacity .5s ease .2s;
  pointer-events:none;
  z-index:-1;
  overflow:hidden;
}
.letter::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(to right,var(--blush),var(--peach),var(--lavender));
}
.letter-lines{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.letter-line{
  height:5px;border-radius:4px;
  background:linear-gradient(to right,rgba(249,196,204,.5),rgba(253,219,180,.3));
}
.letter-line:nth-child(2){width:85%}
.letter-line:nth-child(3){width:70%}
.letter-icon{
  font-size:18px;text-align:center;display:block;
  margin-bottom:6px;opacity:.8;
}

.opened .letter{
  transform:translateX(-50%) translateY(-88%);
  opacity:1;
  pointer-events:none;
  z-index:2;
}

/* ── CONTENT CARD ── */
.content-card{
  position:absolute;
  inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:clamp(12px,2.5vh,20px);
  padding:clamp(24px,6vw,48px);
  opacity:0;pointer-events:none;
  transition:opacity .6s ease;
  z-index:10;
  text-align:center;
}
.content-card.show{
  opacity:1;pointer-events:all;
}

.content-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,5vw,2.4rem);
  color:var(--rose);
  line-height:1.25;
  animation:none;
}
.content-sub{
  font-size:clamp(.82rem,2.5vw,.95rem);
  color:var(--soft);
  font-style:italic;
  max-width:340px;
  line-height:1.7;
}
.divider-row{
  display:flex;align-items:center;gap:10px;
}
.div-line{width:50px;height:1px;background:linear-gradient(to right,transparent,var(--blush))}
.div-line.r{background:linear-gradient(to left,transparent,var(--blush))}

.cta-btn{
  margin-top:4px;
  padding:clamp(12px,2.5vw,14px) clamp(28px,6vw,42px);
  background:linear-gradient(135deg,var(--rose),#c4556e);
  color:white;
  border:none;border-radius:40px;
  font-family:'DM Sans',sans-serif;
  font-size:clamp(.85rem,2.5vw,.95rem);
  font-weight:500;
  letter-spacing:.8px;
  cursor:pointer;
  box-shadow:0 8px 24px rgba(212,99,122,.35);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  text-decoration:none;
  display:inline-block;
}
.cta-btn:hover{
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 14px 32px rgba(212,99,122,.45);
}
.cta-btn:active{transform:scale(.97)}

.content-note{
  font-size:.68rem;
  color:rgba(122,90,99,.35);
  letter-spacing:.5px;
}

/* ── PARTICLES after open ── */
.particle{
  position:fixed;pointer-events:none;
  font-size:clamp(10px,2vw,16px);
  z-index:20;
  animation:particleBurst 1.8s ease-out forwards;
}
@keyframes particleBurst{
  0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:1}
  60%{opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(1) rotate(var(--rot));opacity:0}
}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  .env-wrap,.hint,.bg-petal{animation:none}
  .env-flap,.letter,.seal-group,.content-card{transition:none}
}
</style>
</head>
<body>

<div id="petals"></div>

<!-- initial envelope scene -->
<div class="scene" id="scene">


  <div class="env-wrap" id="envWrap" role="button" tabindex="0" aria-label="Click to open the letter">
    <svg class="env-svg" viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg">

      <!-- envelope body -->
      <rect class="env-body" x="10" y="60" width="340" height="175" rx="6"/>

      <!-- inner bottom triangle -->
      <polygon class="env-inner" points="10,235 180,140 350,235"/>

      <!-- left triangle -->
      <polygon class="env-left" points="10,60 10,235 118,148"/>

      <!-- right triangle -->
      <polygon class="env-right" points="350,60 350,235 242,148"/>

      <!-- fold line suggestion -->
      <line class="env-fold" x1="10" y1="148" x2="118" y2="148"/>
      <line class="env-fold" x1="350" y1="148" x2="242" y2="148"/>

      <!-- flap (folds open on .opened) -->
      <polygon class="env-flap" points="10,62 180,155 350,62"/>

      <!-- wax seal -->
      <g class="seal-group" transform="translate(180,115)">
        <circle cx="0" cy="0" r="22" fill="#d4637a" opacity=".92"/>
        <circle cx="0" cy="0" r="18" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
        <text x="0" y="5" text-anchor="middle" font-size="16" fill="white" font-family="serif">🌸</text>
      </g>

    </svg>

    <!-- the letter peeking out -->
    <div class="letter" id="letter">
      <span class="letter-icon">🌸</span>
      <div class="letter-lines">
        <div class="letter-line"></div>
        <div class="letter-line"></div>
        <div class="letter-line"></div>
      </div>
    </div>
  </div>
</div>

<!-- revealed content -->
<div class="content-card" id="contentCard">
  <div class="content-title">Nhung nhận được<br>một món quà lời chúc 🌸</div>
  <div class="divider-row">
    <div class="div-line"></div>
    <span style="color:var(--blush);font-size:14px">♡</span>
    <div class="div-line r"></div>
  </div>
  <div class="content-sub">Những ký ức và lời chúc từ những người đã đồng hành cùng em tại VNG</div>
  <a class="cta-btn" id="ctaBtn" href="https://heythere-nhung.github.io/wishes-for-you/">
    Mở những lời chúc &nbsp;✦
  </a>
  <div class="content-note">27 wishes · Từ những người yêu quý em</div>
</div>

<script>
// ── BACKGROUND PETALS ──
(function(){
  const c=document.getElementById('petals');
  const em=['🌸','🌺','✿','🌷','❀','🪷'];
  for(let i=0;i<16;i++){
    const p=document.createElement('div');
    p.className='bg-petal';
    p.textContent=em[i%em.length];
    p.style.left=Math.random()*100+'vw';
    p.style.fontSize=(8+Math.random()*8)+'px';
    p.style.animationDuration=(12+Math.random()*14)+'s';
    p.style.animationDelay=(Math.random()*22)+'s';
    c.appendChild(p);
  }
})();

// ── ENVELOPE OPEN ──
let opened=false;

function openEnvelope(){
  if(opened)return;
  opened=true;

  const wrap=document.getElementById('envWrap');
  const content=document.getElementById('contentCard');

  // hide hint


  // trigger envelope open CSS
  wrap.classList.add('opened');

  // burst particles
  setTimeout(()=>{
    burstParticles();
  }, 600);

  // fade in content, fade out envelope
  setTimeout(()=>{
    wrap.style.transition='opacity .5s ease, transform .5s ease';
    wrap.style.opacity='0';
    wrap.style.transform='scale(.9) translateY(10px)';
    wrap.style.pointerEvents='none';
    content.classList.add('show');
  }, 1100);
}

// keyboard support
document.getElementById('envWrap').addEventListener('keydown',e=>{
  if(e.key==='Enter'||e.key===' ')openEnvelope();
});
document.getElementById('envWrap').addEventListener('click',openEnvelope);

// ── PARTICLES ──
function burstParticles(){
  const emojis=['🌸','🌷','🌺','✿','🪷','💕','✨','🌼'];
  const cx=window.innerWidth/2;
  const cy=window.innerHeight/2;
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=emojis[i%emojis.length];
    const angle=Math.random()*Math.PI*2;
    const dist=80+Math.random()*180;
    p.style.setProperty('--tx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--ty',Math.sin(angle)*dist+'px');
    p.style.setProperty('--rot',(Math.random()*360-180)+'deg');
    p.style.left=cx+'px';
    p.style.top=cy+'px';
    p.style.animationDelay=(Math.random()*.2)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 2200);
  }
}
</script>
</body>
</html>
